<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="color-scheme" content="dark" />
    <title>zeroclaw companion</title>
    <style>
      html, body, #root { height: 100%; margin: 0; }
      body {
        background: #0b0d10;
        color: #e6e6e6;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <!-- Live2D Cubism 4 Core SDK (for *.moc3 / model3.json models) -->
    <script src="/live2dcubismcore.min.js"></script>
    <!-- Live2D Cubism 2 Web SDK (for *.moc / model.json models, e.g. Asuna).
         Loaded eagerly here so pixi-live2d-display/cubism2 finds the global
         `Live2D` object when it imports. -->
    <script src="/live2d.min.js"></script>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
