name: Bug report
description: Something is broken or behaving unexpectedly.
labels: ["bug", "triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for filing a report. The more of the fields below you
        fill in, the faster we can reproduce and fix the issue.

  - type: textarea
    id: what-happened
    attributes:
      label: What happened
      description: A short description of the problem.
      placeholder: e.g. The avatar window opens but the Live2D model doesn't render.
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: What you expected
      placeholder: e.g. The model should appear within ~2 seconds of opening the window.
    validations:
      required: true

  - type: textarea
    id: repro
    attributes:
      label: Steps to reproduce
      description: Minimal sequence a maintainer can follow.
      placeholder: |
        1. Clone repo, copy companion.toml.example → companion.toml
        2. Drop a Cubism 4 model under web/public/live2d/models/foo/
        3. Run `cargo run -p companion-server --release`
        4. Open http://127.0.0.1:9181/avatar
    validations:
      required: true

  - type: input
    id: os
    attributes:
      label: Operating system
      placeholder: e.g. Windows 11 26100, Ubuntu 24.04, macOS 15.0
    validations:
      required: true

  - type: input
    id: rust
    attributes:
      label: Rust version
      description: Output of `rustc --version`.
      placeholder: e.g. rustc 1.88.0 (stable)
    validations:
      required: true

  - type: input
    id: node
    attributes:
      label: Node.js version (if a UI bug)
      description: Output of `node --version`.
      placeholder: e.g. v20.18.0

  - type: dropdown
    id: agent
    attributes:
      label: Which agent backend are you using?
      options:
        - zeroclaw
        - openclaw
        - hermes
        - custom
        - "not applicable / no agent configured"
    validations:
      required: true

  - type: dropdown
    id: tts
    attributes:
      label: Which TTS engine are you using?
      options:
        - qwen3-tts-1.7b
        - openai
        - gpt-sovits-v4
        - edge-tts
        - other / custom
        - "not applicable"
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Relevant log output
      description: |
        Last ~100 lines of `companion.err.log` or `companion.log` if
        the issue is server-side. **Redact API keys, paths to private
        files, and any agent prompts you don't want public.**
      render: shell

  - type: textarea
    id: config
    attributes:
      label: Relevant companion.toml section (optional)
      description: Redact secrets first.
      render: toml
